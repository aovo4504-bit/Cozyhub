<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Đổi Thẻ</title>

<style>
body{
background:#0f172a;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#fff;
}
.box{
width:350px;
padding:20px;
background:#1e293b;
border-radius:20px;
}
input,select,button{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
}
button{
background:#3b82f6;
color:white;
cursor:pointer;
}
#msg{
margin-top:15px;
}
</style>

</head>
<body>

<div class="box">

<h2>Đổi Thẻ Cào</h2>

<select id="telco">
<option>VIETTEL</option>
<option>VINAPHONE</option>
<option>MOBIFONE</option>
</select>

<input id="serial" placeholder="Serial">

<input id="code" placeholder="Mã thẻ">

<button onclick="send()">Đổi Thẻ</button>

<div id="msg"></div>

</div>

<script>

async function send(){

msg.innerHTML="Đang gửi...";

const res=await fetch("/api/callback",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

telco:telco.value,

serial:serial.value,

code:code.value

})

});

const data=await res.json();

msg.innerHTML=data.message;

}

</script>

</body>
</html>
