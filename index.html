<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Video Generator Pro</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:#fff;
}

/* MENU */
.nav {
  display:flex;
  background:#1a1a1a;
  padding:10px;
  gap:20px;
}
.nav div {
  cursor:pointer;
  padding:8px 12px;
}
.nav div:hover {
  background:#333;
  border-radius:6px;
}

/* LAYOUT */
.container {
  display:flex;
  padding:20px;
  gap:20px;
}

/* FORM */
.form {
  width:300px;
  background:#1a1a1a;
  padding:15px;
  border-radius:10px;
}
input, textarea {
  width:100%;
  padding:8px;
  margin:5px 0;
  border:none;
  border-radius:6px;
}
button {
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#00c3ff;
  border:none;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* TABLE */
.table {
  flex:1;
  background:#1a1a1a;
  padding:15px;
  border-radius:10px;
}
.row {
  display:grid;
  grid-template-columns:80px 1fr 1fr;
  border-bottom:1px solid #333;
  padding:8px 0;
}
.header {
  font-weight:bold;
  background:#222;
}

pre {
  background:#000;
  padding:10px;
  margin-top:10px;
  white-space:pre-wrap;
}
</style>

</head>
<body>

<!-- MENU -->
<div class="nav">
  <div>Home</div>
  <div>Storyboard</div>
  <div>Export</div>
</div>

<div class="container">

<!-- FORM -->
<div class="form">
  <h3>Input</h3>

  <input id="subject" value="Vietnamese girl">
  <input id="location" value="Hanoi vintage cafe">
  <input id="looks" type="number" value="3">
  <textarea id="outfits">black dress, white dress, polka dot dress</textarea>

  <button onclick="generate()">Generate</button>
  <button onclick="copyText()">Copy</button>
</div>

<!-- TABLE -->
<div class="table">
  <h3>Storyboard</h3>

  <div class="row header">
    <div>#</div>
    <div>Scene</div>
    <div>Description</div>
  </div>

  <div id="tableContent"></div>

  <pre id="output"></pre>
</div>

</div>

<script>
function generate() {
  let subject = document.getElementById("subject").value;
  let location = document.getElementById("location").value;
  let outfits = document.getElementById("outfits").value.split(",");

  let tableHTML = "";
  let textOutput = "";

  let sceneIndex = 1;

  outfits.forEach((o, i) => {
    let outfit = o.trim();

    let scenes = [
      "Start Image",
      "Motion",
      "End Image"
    ];

    scenes.forEach(scene => {
      let desc = "";

      if(scene === "Start Image") {
        desc = `${subject} wearing ${outfit}, in ${location}, cinematic`;
      }
      if(scene === "Motion") {
        desc = `natural movement, camera pan`;
      }
      if(scene === "End Image") {
        desc = `final pose, warm lighting`;
      }

      tableHTML += `
        <div class="row">
          <div>${sceneIndex}</div>
          <div>${scene}</div>
          <div>${desc}</div>
        </div>
      `;

      textOutput += `Scene ${sceneIndex}: ${desc}\n`;
      sceneIndex++;
    });
  });

  document.getElementById("tableContent").innerHTML = tableHTML;
  document.getElementById("output").innerText = textOutput;
}

function copyText() {
  let text = document.getElementById("output").innerText;
  navigator.clipboard.writeText(text);
  alert("Copied!");
}
</script>

</body>
</html>
