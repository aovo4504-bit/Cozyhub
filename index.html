<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cấu Hình Kết Nối API - Premium Glassmorphism</title>
    <style>
        /** ==========================================
         *  1. DESIGN TOKENS & THEMING
         *  ========================================== */
        :root {
            /* Light Theme */
            --bg-base: #e2e8f0;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.4);
            --glass-shadow: rgba(0, 0, 0, 0.05);
            --input-bg: rgba(255, 255, 255, 0.9);
            --input-border: rgba(203, 213, 225, 0.8);
            --brand-primary: #3b82f6;
            --brand-success: #10b981; /* Màu nút Thêm thông tin */
            --brand-danger: #ef4444;
            --focus-ring: rgba(59, 130, 246, 0.3);
            --nav-height: 70px;
        }

        [data-theme="dark"] {
            /* Dark Theme */
            --bg-base: #020617;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: rgba(0, 0, 0, 0.4);
            --input-bg: rgba(15, 23, 42, 0.6);
            --input-border: rgba(51, 65, 85, 0.8);
            --brand-primary: #6366f1;
            --brand-success: #10b981;
            --focus-ring: rgba(99, 102, 241, 0.3);
        }

        /** ==========================================
         *  2. RESET & BASE LAYOUT
         *  ========================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-base);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.1) 0%, transparent 40%);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        .container {
            max-width: 800px; /* Nhỏ hơn form nạp thẻ để tập trung vào settings */
            margin: 0 auto;
            padding: 0 20px;
        }

        /** ==========================================
         *  3. GLASSMORPHISM CORE
         *  ========================================== */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 16px 40px 0 var(--glass-shadow);
            border-radius: 24px;
            position: relative;
            z-index: 10;
        }

        /** ==========================================
         *  4. COMPONENTS
         *  ========================================== */
        
        /* Header */
        header {
            position: fixed;
            top: 10px; left: 10px; right: 10px;
            height: var(--nav-height);
            z-index: 1000;
            display: flex;
            align-items: center;
            border-radius: 20px;
            padding: 0 20px;
        }

        .header-inner {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left, .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .btn-icon {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 24px;
            cursor: pointer;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s ease;
        }
        .btn-icon:hover { background: rgba(255, 255, 255, 0.1); }
        
        .brand-logo {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(45deg, var(--brand-primary), #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 12px 6px 6px;
            background: rgba(0,0,0,0.05);
            border-radius: 30px;
            border: 1px solid var(--glass-border);
        }
        [data-theme="dark"] .user-profile { background: rgba(255,255,255,0.05); }
        
        .user-name {
            font-size: 14px;
            font-weight: 600;
            display: none;
        }
        @media (min-width: 600px) { .user-name { display: block; } }

        .avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 2px solid var(--brand-primary); }

        /* Main Content */
        main {
            padding-top: calc(var(--nav-height) + 40px);
            padding-bottom: 100px;
        }

        .page-header {
            margin-bottom: 30px;
            text-align: center;
        }
        .page-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .page-desc {
            color: var(--text-secondary);
            font-size: 15px;
        }

        /* Form Configuration */
        .config-form-wrap {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .form-label {
            display: block;
            margin-bottom: 10px;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .form-control {
            width: 100%;
            padding: 16px 20px;
            border-radius: 16px;
            border: 1px solid var(--input-border);
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }

        .form-control:focus {
            border-color: var(--brand-primary);
            box-shadow: 0 0 0 4px var(--focus-ring);
            transform: translateY(-2px);
        }

        /* Custom Select Arrow */
        select.form-control {
            appearance: none;
            cursor: pointer;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2364748b%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 20px top 50%;
            background-size: 12px auto;
        }

        [data-theme="dark"] select.form-control {
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2394a3b8%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
        }

        .form-control::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            border: none;
            background: var(--brand-success);
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.5);
            background: #0ea5e9; /* Chuyển màu nhẹ khi hover tạo cảm giác dynamic */
        }

        .btn-submit:active { transform: translateY(0); }
        .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; transform: none; box-shadow: none; }

        /* Spinner */
        .spinner {
            display: none; width: 24px; height: 24px;
            border: 3px solid rgba(255,255,255,0.3); border-radius: 50%;
            border-top-color: white; animation: spin 1s linear infinite;
            position: absolute; left: 50%; top: 50%; margin-left: -12px; margin-top: -12px;
        }
        .btn-submit.loading .btn-text { opacity: 0; }
        .btn-submit.loading .spinner { display: block; }

        /* Floating Action Buttons (FAB) */
        .fab-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 999;
        }

        .fab {
            width: 56px; height: 56px;
            border-radius: 50%;
            border: none;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; color: white;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }
        .fab:hover { transform: scale(1.1); }
        .fab-messenger { background: linear-gradient(45deg, #00B2FF, #006AFF); }
        .fab-support { background: linear-gradient(45deg, #3b82f6, #2563eb); }

        /* Toasts */
        #toast-container { position: fixed; top: 90px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 12px; }
        .toast {
            min-width: 280px; padding: 16px 24px; border-radius: 16px; color: white;
            font-weight: 600; font-size: 15px; display: flex; align-items: center; gap: 12px;
            animation: slideInRight 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2);
        }
        .toast.success { background: rgba(16, 185, 129, 0.9); }
        .toast.error { background: rgba(239, 68, 68, 0.9); }

        /* Animations */
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(100px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }
        
        .animate-enter { animation: fadeInScale 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        .ripple {
            position: absolute; border-radius: 50%; transform: scale(0);
            animation: ripple-anim 0.6s linear; background: rgba(255,255,255,0.3); pointer-events: none;
        }

    </style>
</head>
<body>

    <!-- Header -->
    <header class="glass-panel container" style="border-radius: 20px; margin-top: 15px; max-width: calc(100% - 30px);">
        <div class="header-inner">
            <div class="header-left">
                <button class="btn-icon" aria-label="Menu" id="btn-menu">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                <a href="#" class="brand-logo">THESIEURE</a>
            </div>
            <div class="header-right">
                <button class="btn-icon" id="theme-toggle" aria-label="Toggle Theme">🌓</button>
                <div class="user-profile">
                    <span class="user-name">Nguyễn Hoàng Cao Cường</span>
                    <img src="https://ui-avatars.com/api/?name=Cuong+Nguyen&background=6366f1&color=fff" alt="Avatar" class="avatar">
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container">
        <div class="page-header animate-enter" style="animation-delay: 0.1s;">
            <h1 class="page-title">Cấu Hình Kết Nối</h1>
            <p class="page-desc">Thiết lập Webhook để nhận dữ liệu gạch thẻ tự động</p>
        </div>

        <section class="glass-panel config-form-wrap animate-enter" style="animation-delay: 0.2s;">
            <form id="api-config-form" novalidate>
                
                <div class="form-group">
                    <label class="form-label" for="api_type">Loại API</label>
                    <select class="form-control" id="api_type" name="api_type">
                        <option value="doi_the_cao" selected>Đổi thẻ cào</option>
                        <option value="mua_the">Mua thẻ điện thoại</option>
                        <option value="topup">Nạp tiền điện thoại</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="wallet_select">Chọn ví giao dịch</label>
                    <select class="form-control" id="wallet_select" name="wallet_select">
                        <option value="vnd" selected>VND - 0đ</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="request_method">Kiểu</label>
                    <select class="form-control" id="request_method" name="request_method">
                        <option value="GET" selected>GET</option>
                        <option value="POST">POST</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="callback_url">Đường dẫn nhận dữ liệu (Callback Url)</label>
                    <input type="url" class="form-control" id="callback_url" name="callback_url" 
                           placeholder="https://your-domain.com/api/callback" autocomplete="off" spellcheck="false">
                </div>

                <div class="form-group">
                    <label class="form-label" for="ip_whitelist">Địa chỉ IP (không bắt buộc)</label>
                    <input type="text" class="form-control" id="ip_whitelist" name="ip_whitelist" 
                           placeholder="Nhập IP Server của bạn (VD: 192.168.1.1)" autocomplete="off" spellcheck="false">
                </div>

                <button type="submit" class="btn-submit" id="btn-save">
                    <span class="btn-text">Thêm thông tin kết nối</span>
                    <div class="spinner"></div>
                </button>
            </form>
        </section>
    </main>

    <!-- Floating Action Buttons -->
    <div class="fab-container animate-enter" style="animation-delay: 0.4s;">
        <button class="fab fab-support" aria-label="Support" onclick="UI.showToast('Đang kết nối trung tâm hỗ trợ...', 'success')">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11a3 3 0 1 0 6 0 3 3 0 0 0-6 0z"/><path d="M17.657 16.657L13.414 20.9a2 2 0 0 1-2.827 0l-4.244-4.243a8 8 0 1 1 11.314 0z"/></svg>
        </button>
        <button class="fab fab-messenger" aria-label="Messenger" onclick="UI.showToast('Mở Messenger', 'success')">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.16 7.69C19.78 4.24 16.14 2 12 2 7.03 2 3 6.03 3 11c0 2.22.81 4.26 2.15 5.83.25.3.36.7.3 1.1l-.34 2.1c-.08.51.35.96.86.84l2.12-.48c.38-.08.77-.04 1.13.1 1 .37 2.13.58 3.3.58 5.67 0 10.4-3.77 11.75-9 .22-.85-.16-1.74-.95-2.09zM12.92 14.5l-2.02-2.17c-.24-.26-.64-.28-.9-.05l-3.23 2.76c-.32.27-.75-.1-.53-.45l3.24-5.26c.26-.42.84-.48 1.18-.12l2.02 2.17c.24.26.64.28.9.05l3.23-2.76c.32-.27.75.1.53.45l-3.24 5.26c-.26.42-.84.48-1.18.12z"/></svg>
        </button>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <script>
        /** ==========================================
         *  KIẾN TRÚC JAVASCRIPT OOP (ES2025+)
         *  ========================================== */

        // 1. Validator Utility
        class Validator {
            static isURL(string) {
                try {
                    const url = new URL(string);
                    return url.protocol === "http:" || url.protocol === "https:";
                } catch (_) {
                    return false;
                }
            }

            static isIPv4(string) {
                if(!string) return true; // Vì không bắt buộc
                const ipv4Regex = /^(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$/;
                return ipv4Regex.test(string);
            }
        }

        // 2. Data Storage Manager
        class StorageManager {
            static KEY = 'thesieure_api_config';
            
            static saveConfig(data) {
                try {
                    localStorage.setItem(this.KEY, JSON.stringify(data));
                    return true;
                } catch (e) {
                    console.error("Storage Error:", e);
                    return false;
                }
            }

            static getConfig() {
                try {
                    return JSON.parse(localStorage.getItem(this.KEY));
                } catch (e) {
                    return null;
                }
            }
        }

        // 3. UI Controller
        class UI {
            static showToast(message, type = 'success') {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                
                const icon = type === 'success' 
                    ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>'
                    : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>';

                toast.innerHTML = `<span>${icon}</span> <span>${message}</span>`;
                container.appendChild(toast);
                
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateX(100px)';
                    toast.style.transition = 'all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                    setTimeout(() => toast.remove(), 400);
                }, 3500);
            }

            static toggleLoading(btn, isLoading) {
                if (isLoading) {
                    btn.classList.add('loading');
                    btn.disabled = true;
                } else {
                    btn.classList.remove('loading');
                    btn.disabled = false;
                }
            }

            static createRipple(event, element) {
                const circle = document.createElement('span');
                const diameter = Math.max(element.clientWidth, element.clientHeight);
                const radius = diameter / 2;
                const rect = element.getBoundingClientRect();
                
                circle.style.width = circle.style.height = `${diameter}px`;
                circle.style.left = `${event.clientX - rect.left - radius}px`;
                circle.style.top = `${event.clientY - rect.top - radius}px`;
                circle.classList.add('ripple');
                
                const existingRipple = element.querySelector('.ripple');
                if (existingRipple) existingRipple.remove();
                element.appendChild(circle);
            }
        }

        // 4. Main Application Controller
        class APIConfigController {
            constructor() {
                this.form = document.getElementById('api-config-form');
                this.btnSubmit = document.getElementById('btn-save');
                this.initTheme();
                this.loadExistingConfig();
                this.bindEvents();
            }

            initTheme() {
                const toggle = document.getElementById('theme-toggle');
                const savedTheme = localStorage.getItem('theme_preference') || 'dark';
                document.documentElement.setAttribute('data-theme', savedTheme);
                
                toggle.addEventListener('click', () => {
                    const current = document.documentElement.getAttribute('data-theme');
                    const next = current === 'dark' ? 'light' : 'dark';
                    document.documentElement.setAttribute('data-theme', next);
                    localStorage.setItem('theme_preference', next);
                });
            }

            loadExistingConfig() {
                const savedData = StorageManager.getConfig();
                if(savedData) {
                    document.getElementById('api_type').value = savedData.api_type || 'doi_the_cao';
                    document.getElementById('wallet_select').value = savedData.wallet_select || 'vnd';
                    document.getElementById('request_method').value = savedData.request_method || 'GET';
                    document.getElementById('callback_url').value = savedData.callback_url || '';
                    document.getElementById('ip_whitelist').value = savedData.ip_whitelist || '';
                }
            }

            bindEvents() {
                // Button Ripple & Submisison
                this.form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    UI.createRipple(e, this.btnSubmit);
                    
                    const formData = {
                        api_type: document.getElementById('api_type').value,
                        wallet_select: document.getElementById('wallet_select').value,
                        request_method: document.getElementById('request_method').value,
                        callback_url: document.getElementById('callback_url').value.trim(),
                        ip_whitelist: document.getElementById('ip_whitelist').value.trim()
                    };

                    // 1. Validation Lớp Client
                    if (!formData.callback_url) {
                        return UI.showToast('Vui lòng nhập đường dẫn Callback', 'error');
                    }
                    if (!Validator.isURL(formData.callback_url)) {
                        return UI.showToast('Đường dẫn Callback không hợp lệ (cần http/https)', 'error');
                    }
                    if (formData.ip_whitelist && !Validator.isIPv4(formData.ip_whitelist)) {
                        return UI.showToast('Địa chỉ IP không đúng định dạng IPv4', 'error');
                    }

                    // 2. Chuyển trạng thái Loading
                    UI.toggleLoading(this.btnSubmit, true);

                    // 3. Giả lập gọi API lưu kết nối (Mocking Server Request)
                    try {
                        await new Promise((resolve) => setTimeout(resolve, 1200)); // Delay 1.2s
                        
                        // Lưu xuống LocalStorage để mô phỏng DB
                        const isSaved = StorageManager.saveConfig(formData);
                        
                        if(isSaved) {
                            UI.showToast('Cập nhật thông tin kết nối thành công!', 'success');
                            // Hiệu ứng hoàn thành rực rỡ
                            this.btnSubmit.style.background = '#10b981';
                            setTimeout(() => {
                                this.btnSubmit.style.background = '';
                            }, 2000);
                        } else {
                            throw new Error('Không thể ghi dữ liệu cục bộ');
                        }
                    } catch (error) {
                        UI.showToast('Đã có lỗi xảy ra từ máy chủ.', 'error');
                    } finally {
                        UI.toggleLoading(this.btnSubmit, false);
                    }
                });

                // Tương tác nút menu
                document.getElementById('btn-menu').addEventListener('click', (e) => {
                    UI.createRipple(e, e.currentTarget);
                    UI.showToast('Mở Sidebar (Tính năng chưa liên kết)', 'success');
                });
            }
        }

        // Kích hoạt ứng dụng
        document.addEventListener('DOMContentLoaded', () => {
            new APIConfigController();
        });

    </script>
</body>
</html>
